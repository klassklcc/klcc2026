<!doctype html>
<html lang="en">
  <head>
    <title>KL Coding Cup</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="icon" href="/images/favicon.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Abril+Fatface&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="colorlib-page" style="margin-right: 15rem">
      <div id="colorlib-main" style="margin-right: 20rem">
        <section
          class="ftco-section ftco-no-pt ftco-no-pb"
          style="margin-left: 40%; margin-right: 30%; margin-top: 17rem"
        >
          <div class="login-container">
            <h2>Enter Password</h2>
            <input type="password" id="password" placeholder="Password" />
            <button onclick="submitPassword()">Submit</button>
          </div>
        </section>
      </div>
    </div>
    <script>
      function hash(string) {
        string = String(string);
        let h = 0;
        if (string.length === 0) return "0";

        for (let i = 0; i < string.length; i++) {
          const char = string.charCodeAt(i);
          h = (h << 5) - h + char;
          h = h & h;
        }
        return h.toString();
      }

      function normalizePageName(name) {
        if (!name) return null;
        name = String(name).trim();

        // get last path segment if a full path/string is passed
        name = name.split("/").pop();

        // remove query/hash
        name = name.split("?")[0].split("#")[0];

        // remove .html extension if present
        name = name.replace(/\.html$/i, "");

        return name || null;
      }

      function getReferrerPageName() {
        if (!document.referrer) return null;

        try {
          const refUrl = new URL(document.referrer, window.location.origin);
          return normalizePageName(refUrl.pathname);
        } catch (e) {
          return null;
        }
      }

      function submitPassword() {
        const password = document.getElementById("password").value.trim();
        const userHash = hash(password);

        // store stage names WITHOUT .html
        const adjacentPasswordMap = {
          introne: {
            1816: "/r1p2_kx921",
          },

          r1p2_kx921: {
            257205458: "/r2p1_zm442",
          },

          r2p1_zm442: {
            1574: "/r2p2_af812",
            1605: "/r2p2_af812",
          },

          r2p2_af812: {
            294056: "/r2p3_da101",
            52: "/r2p3_da101",
          },

          r2p3_da101: {
            52601: "/r3p1_mq654",
          },

          r3p1_mq654: {
            1692: "/r3p2_nio48",
          },

          r3p2_nio48: {
            51757: "/r3p3_nio48",
          },

          r3p3_nio48: {
            91451443: "/r3p4_svkno",
          },

          r3p4_svkno: {
            1791948915: "/final_da0su",
          },

          final_da0su: {
            52722: "/82123",
          },
        };

        const previousPage = getReferrerPageName();

        if (!previousPage) {
          alert(
            "Could not verify previous page. Please go through the challenge normally.",
          );
          return;
        }

        const allowedAnswers = adjacentPasswordMap[previousPage];

        if (!allowedAnswers) {
          alert(
            "This page cannot determine the correct previous stage. Previous page detected: " +
              previousPage,
          );
          return;
        }

        if (Object.prototype.hasOwnProperty.call(allowedAnswers, userHash)) {
          window.location.href = allowedAnswers[userHash];
        } else {
          alert("Incorrect password!");
        }
      }

      document
        .getElementById("password")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            submitPassword();
          }
        });
    </script>
  </body>
</html>
