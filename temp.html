<!doctype html>
<html lang="en">
  <head>
    <title>KL Coding Cup</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="icon" href="/images/favicon.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Abril+Fatface&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="colorlib-page" style="margin-right: 15rem">
      <div id="colorlib-main" style="margin-right: 20rem">
        <section
          class="ftco-section ftco-no-pt ftco-no-pb"
          style="margin-left: 40%; margin-right: 30%; margin-top: 17rem"
        >
          <div class="login-container">
            <h2>Enter Password</h2>
            <input type="password" id="password" placeholder="Password" />
            <button onclick="submitPassword()">Submit</button>
          </div>
        </section>
      </div>
    </div>

    <script>
      function hash(string) {
        string = String(string);
        let h = 0;
        if (string.length === 0) return "0";

        for (let i = 0; i < string.length; i++) {
          const char = string.charCodeAt(i);
          h = (h << 5) - h + char;
          h = h & h;
        }
        return h.toString();
      }

      function getReferrerFileName() {
        if (!document.referrer) return null;

        try {
          const refUrl = new URL(document.referrer, window.location.origin);
          let fileName = refUrl.pathname.split("/").pop() || null;

          if (!fileName) return null;

          fileName = fileName.split("?")[0].split("#")[0].trim();
          return fileName || null;
        } catch (e) {
          return null;
        }
      }

      function submitPassword() {
        const password = document.getElementById("password").value.trim();
        const userHash = hash(password);

        /*
          previous page -> allowed answer hash(es) -> next page
          users can only progress from the page they actually came from
        */
        const adjacentPasswordMap = {
          "introne.html": {
            1816: atob("cjFwMl9reDkyMS5odG1s"),
          },

          "r1p2_kx921.html": {
            257205458: "r2p1_zm442.html",
          },

          "r2p1_zm442.html": {
            1574: atob("cjJwMl9hZjgxMi5odG1s"),
            1605: atob("cjJwMl9hZjgxMi5odG1s"),
          },

          "r2p2_af812.html": {
            294056: atob("cjNwMV9tcTY1NC5odG1s"),
            52: atob("cjNwMV9tcTY1NC5odG1s"),
          },

          "r3p1_mq654.html": {
            1692: atob("cjNwM19uaW80OC5odG1s"),
          },

          "r3p3_nio48.html": {
            91451443: atob("cjNwNF9zdmtuby5odG1s"),
          },

          "r3p4_svkno.html": {
            1791948915: atob("ZmluYWxfZGEwc3UuaHRtbA=="),
          },

          "final_da0su.html": {
            52722: atob("ODIxMjMuaHRtbA=="),
          },
        };

        const previousFile = getReferrerFileName();

        if (!previousFile) {
          alert(
            "Could not verify previous page. Please go through the challenge normally.",
          );
          return;
        }

        const allowedAnswers = adjacentPasswordMap[previousFile];

        if (!allowedAnswers) {
          alert(
            "This page cannot determine the correct previous stage. Previous page detected: " +
              previousFile,
          );
          return;
        }

        if (Object.prototype.hasOwnProperty.call(allowedAnswers, userHash)) {
          window.location.href = allowedAnswers[userHash];
        } else {
          alert("Incorrect password!");
        }
      }

      document
        .getElementById("password")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            submitPassword();
          }
        });
    </script>
  </body>
</html>
