<!doctype html>
<html lang="en">
  <head>
    <title>KL Coding Cup</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="icon" href="/images/favicon.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Abril+Fatface&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="colorlib-page" style="margin-right: 15rem">
      <div id="colorlib-main" style="margin-right: 20rem">
        <section
          class="ftco-section ftco-no-pt ftco-no-pb"
          style="margin-left: 40%; margin-right: 30%; margin-top: 17rem"
        >
          <div class="login-container">
            <h2>Enter Password</h2>
            <input type="password" id="password" placeholder="Password" />
            <button onclick="submitPassword()">Submit</button>
          </div>
        </section>
      </div>
    </div>

    <script>
      function hash(string) {
        string = string.toString();
        let hash = 0;
        if (string.length === 0) return hash;

        for (let i = 0; i < string.length; i++) {
          const char = string.charCodeAt(i);
          hash = (hash << 5) - hash + char;
          hash = hash & hash;
        }
        return hash;
      }

      /* 
      SET THE CURRENT LEVEL HERE
      Change this number on each page
      */
      const CURRENT_LEVEL = 1;

      function submitPassword() {
        const password = document.getElementById("password").value;
        const userHash = hash(password);

        /*
        passwordRedirectMap is ordered by adjacency
        each level contains ONLY the hashes valid for that level
        */

        const passwordRedirectMap = {
          1: {
            1816: atob("cjFwMl9reDkyMS5odG1s"),
          },

          2: {
            257205458: atob("cjJwaV96bTQ0Mi5odG1s"),
          },

          3: {
            1574: atob("cjJwMl9hZjgxMi5odG1s"),
            1605: atob("cjJwMl9hZjgxMi5odG1s"),
          },

          4: {
            294056: atob("cjNwMV9tcTY1NC5odG1s"),
            52: atob("cjNwMV9tcTY1NC5odG1s"),
          },

          5: {
            1692: atob("cjNwM19uaW80OC5odG1s"),
          },

          6: {
            91451443: atob("cjNwNF9zdmtuby5odG1s"),
          },

          7: {
            1791948915: atob("ZmluYWxfZGEwc3UuaHRtbA=="),
          },

          8: {
            52722: atob("ODIxMjMuaHRtbA=="),
          },
        };

        const levelMap = passwordRedirectMap[CURRENT_LEVEL];

        if (levelMap && userHash in levelMap) {
          window.location.href = levelMap[userHash];
        } else {
          alert("Incorrect password!");
        }
      }
    </script>
  </body>
</html>
